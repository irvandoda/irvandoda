<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="300" fill="#0D1117" />
  <style>
    @keyframes glow { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    @keyframes slide { 0% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 100% { transform: translateX(-10px); } }
    .header { font: bold 65px 'Segoe UI', Arial, sans-serif; fill: url(#neonGradient); animation: glow 3s infinite; }
    .subheader { font: 24px 'Segoe UI', Arial, sans-serif; fill: #38BDF8; letter-spacing: 5px; text-transform: uppercase; animation: slide 5s infinite; }
    .service-box { fill: #1E293B; stroke: #38BDF8; stroke-width: 1; opacity: 0.5; }
  </style>
  <defs>
    <linearGradient id="neonGradient" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D2FF" />
      <stop offset="0.5" stop-color="#9333EA" />
      <stop offset="1" stop-color="#F43F5E" />
    </linearGradient>
  </defs>
  <rect x="50" y="50" width="900" height="200" rx="15" class="service-box" />
  <text x="500" y="150" text-anchor="middle" class="header">IRVANDO DEMAS</text>
  <text x="500" y="210" text-anchor="middle" class="subheader">Solutions Architect • Digital Expert</text>
</svg>